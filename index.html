<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Planner Semanal + Calendário Mensal</title>
<style>
:root{
  --accent:#b71c1c;
  --bg:#fafafa;
  --text:#000;
  --page-margin:1.5cm;
  --card-gap:8px;
}

/* base */
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;font-size:10pt;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* header */
.header{display:flex;justify-content:space-between;align-items:center;background:var(--accent);color:#fff;padding:8px 12px}
.header div{display:flex;align-items:center;gap:8px}
.btn{background:#fff;color:var(--accent);border:none;padding:6px 10px;border-radius:4px;font-weight:bold;cursor:pointer}
#monthLabel{font-weight:bold;cursor:pointer;user-select:none}

/* container & layout 4/3 */
.container{max-width:1200px;margin:10px auto;padding:10px}
.week{display:flex;gap:var(--card-gap);align-items:flex-start}
.left-col{flex:4;display:flex;flex-direction:column;gap:var(--card-gap)}
.right-col{flex:3;display:flex;flex-direction:column;gap:var(--card-gap)}
.spiral{display:flex;flex-direction:column;justify-content:center;align-items:center;width:40px;gap:6px}
.spiral .dot{width:8px;height:8px;border-radius:50%;background:#333;box-shadow:0 1px 1px rgba(0,0,0,0.2)}

/* day card */
.day-card{background:#fff;border:1px solid rgba(0,0,0,0.14);border-radius:8px;padding:8px;position:relative;display:flex;flex-direction:column;cursor:pointer;overflow:hidden}
.day-card { aspect-ratio: 1 / 1; } /* keep square proportions */
.day-card.weekend,.day-card.holiday{background:var(--accent);color:#fff}

/* lines behind */
.lines{
  position:absolute;
  left:0; right:0; top:0; bottom:0;
  z-index:0;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 18px,
    rgba(0,0,0,0.05) 18px,
    rgba(0,0,0,0.05) 19px
  );
  pointer-events:none;
}

/* card content */
.day-content{position:relative;z-index:2;display:flex;flex-direction:column;height:100%}
.day-header{display:flex;justify-content:space-between;margin-bottom:6px;font-weight:bold}
.note{flex:1;overflow:auto;padding-left:6px;font-size:10pt;z-index:2;background:transparent}

/* editor */
.editor-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;z-index:120;padding:20px}
.editor-overlay.active{display:flex}
.editor{background:#fff;padding:12px;border-radius:6px;width:100%;max-width:980px;display:flex;flex-direction:column;gap:8px;box-shadow:0 12px 40px rgba(0,0,0,0.35)}
.editorTitleRow{display:flex;justify-content:space-between;align-items:center}
.editorTitleRow .meta{font-size:12pt;font-weight:bold;color:var(--accent)}
.color-row{display:flex;flex-wrap:wrap;gap:8px}
.color-btn{width:28px;height:28px;border-radius:6px;border:1px solid rgba(0,0,0,0.12);cursor:pointer}
.color-btn.clear{width:36px}

/* editor notebook background lines and left margin */
.editor-lines{
  border:1px dashed rgba(0,0,0,0.12);
  min-height:300px;
  border-radius:6px;
  padding:8px 12px;
  position:relative;
  background:#fff;
  overflow:auto;
  background-image:
    repeating-linear-gradient(to bottom, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 24px);
}
.editor-lines::before{
  content:'';
  position:absolute;
  left:44px;
  top:0;
  bottom:0;
  width:2px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.06) 0.6px, transparent 0.6px);
  background-size:2px 24px;
  pointer-events:none;
}
.editor-lines .line{
  position:relative;
  padding-left:56px;padding-right:8px;
  min-height:24px;line-height:22px;margin:0 0 4px 0;
  background:transparent;
}
.editor-lines .line::before{content:'';position:absolute;left:18px;top:8px;width:8px;height:8px;border-radius:50%;border:2px solid rgba(0,0,0,0.08);background:transparent}
.line[contenteditable="true"]:focus{outline:none}
.line-placeholder{color:#999}

/* month modal */
.month-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;z-index:200;overflow:auto;padding:20px}
.month-modal.active{display:flex}
.month-box{background:#fff;padding:16px;border-radius:6px;max-width:95vw;max-height:95vh;overflow:auto}
.month-grid{width:100%;border-collapse:collapse;font-family:Arial;font-size:10pt;border:1px solid rgba(0,0,0,0.08);table-layout:fixed}
.month-grid th,.month-grid td{border:1px solid rgba(0,0,0,0.08);vertical-align:top;padding:8px;height:90px;overflow:hidden}
.month-grid th{background:#111;padding:10px;color:#fff;font-size:11pt}
.cell-note{margin-top:6px;font-size:9pt;max-height:52px;overflow:hidden}
.holiday-cell,.weekend-cell{background:var(--accent);color:#fff}

/* print */
@media print{
  body{background:#fff}
  .header,.btn{display:none}
  .print-wrapper{padding:var(--page-margin);box-sizing:border-box}
  @page{size:A4 portrait;margin:1.5cm}
}

/* responsive */
@media (max-width:900px){
  .week{flex-direction:column}
  .left-col,.right-col{flex:unset}
  .editor{max-width:96vw}
}
</style>
</head>
<body>
  <div class="header">
    <div>
      <button class="btn" id="prev">◀ Semana</button>
      <button class="btn" id="next">Semana ▶</button>
    </div>
    <div id="monthLabel">Janeiro 2025</div>
    <div>
      <button class="btn" id="preview">Preview</button>
      <button class="btn" id="pdfA4">PDF A4</button>
      <button class="btn" id="pdfA0">PDF A0</button>
      <button class="btn" id="printA0Btn">Imprimir Mês A0</button>
    </div>
  </div>

  <main class="container">
    <div class="week" id="weekRoot">
      <div class="left-col" id="leftCol"></div>
      <div class="spiral" id="spiral"></div>
      <div class="right-col" id="rightCol"></div>
    </div>
  </main>

  <!-- Editor -->
  <div class="editor-overlay" id="editorOverlay">
    <div class="editor" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
      <div class="editorTitleRow">
        <div class="meta" id="editorTitle">Editar anotação</div>
        <div><button class="btn" id="deleteBtn" style="background:#f44336;color:#fff;border:none;">Apagar</button></div>
      </div>

      <div class="color-row" id="colorRow"></div>

      <div class="editor-lines" id="editorLines" tabindex="0" aria-label="Linhas do caderno">
        <!-- linhas são inseridas via JS -->
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:11pt;color:#333">Clique numa linha para editar. Enter cria nova linha abaixo. Selecione texto e clique numa cor para marcar.</div>
        <div class="editor-actions">
          <button class="btn" id="saveBtn">Salvar</button>
          <button class="btn" id="closeBtn">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-modal" id="previewModal"><div class="preview-box" id="previewBox"></div></div>

  <!-- Month Calendar -->
  <div class="month-modal" id="monthModal"><div class="month-box" id="monthBox"></div></div>

  <!-- libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
(function(){
/* ===== constants & refs ===== */
const monthNames = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const editorColors = ["#f44336","#e91e63","#9c27b0","#673ab7","#3f51b5","#2196f3","#03a9f4","#00bcd4","#009688","#4caf50","#8bc34a","#cddc39","#ffeb3b","#ffc107","#ff9800","#ff5722","#795548","#607d8b","#000000","#ffffff"];

const leftCol = document.getElementById('leftCol');
const rightCol = document.getElementById('rightCol');
const spiral = document.getElementById('spiral');
const editorOverlay = document.getElementById('editorOverlay');
const editorLines = document.getElementById('editorLines');
const colorRow = document.getElementById('colorRow');
const monthLabel = document.getElementById('monthLabel');
const monthModal = document.getElementById('monthModal');
const monthBox = document.getElementById('monthBox');
const previewModal = document.getElementById('previewModal');
const previewBox = document.getElementById('previewBox');

let pointer = new Date();
pointer = startOfWeek(pointer);
let editKey = null;

/* ===== build UI: spiral + color buttons ===== */
for(let i=0;i<10;i++){
  const d = document.createElement('div');
  d.className = 'dot';
  spiral.appendChild(d);
}
editorColors.forEach(c=>{
  const b = document.createElement('button');
  b.className = 'color-btn';
  b.style.background = c;
  b.title = c;
  b.onclick = ()=> applyColorToSelection(c);
  colorRow.appendChild(b);
});
const clearBtn = document.createElement('button');
clearBtn.className = 'color-btn clear';
clearBtn.textContent = '✕';
clearBtn.title = 'Limpar marcação';
clearBtn.onclick = ()=> removeColorFromSelection();
colorRow.appendChild(clearBtn);

/* ===== utilities ===== */
function keyOf(d){ return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function startOfWeek(d){
  const t = new Date(d);
  const day = t.getDay();
  const diff = (day === 0) ? -6 : 1 - day; // if sunday go back 6
  t.setDate(t.getDate() + diff);
  t.setHours(0,0,0,0);
  return t;
}

/* feriados fixos + móveis */
function prepareFeriados(year){
  const f = {
    '0-1':'Confraternização',
    '3-21':'Tiradentes',
    '4-1':'Dia do Trabalho',
    '8-7':'Independência',
    '9-12':'N. Aparecida',
    '10-2':'Finados',
    '10-15':'Proclamação',
    '11-25':'Natal'
  };
  const eas = easterDate(year);
  const carnival = new Date(eas); carnival.setDate(eas.getDate()-47);
  const corpus = new Date(eas); corpus.setDate(eas.getDate()+60);
  f[`${carnival.getMonth()}-${carnival.getDate()}`] = 'Carnaval';
  f[`${eas.getMonth()}-${eas.getDate()}`] = 'Páscoa';
  f[`${corpus.getMonth()}-${corpus.getDate()}`] = 'Corpus Christi';
  return f;
}
function easterDate(y){
  const f = Math.floor;
  const G = y % 19;
  const C = f(y/100);
  const H = (C - f(C/4) - f((8*C+13)/25) + 19*G + 15) % 30;
  const I = H - f(H/28) * (1 - f(29/(H+1)) * f((21-G)/11));
  const J = (y + f(y/4) + I + 2 - C + f(C/4)) % 7;
  const L = I - J;
  const m = 3 + f((L + 40) / 44);
  const d = L + 28 - 31 * f(m/4);
  return new Date(y, m-1, d);
}
function isHolidayOrWeekend(d){
  const fer = prepareFeriados(d.getFullYear());
  const k = `${d.getMonth()}-${d.getDate()}`;
  return !!fer[k] || d.getDay() === 0 || d.getDay() === 6;
}

/* ===== render weekly (4 left/3 right) ===== */
function renderWeek(){
  leftCol.innerHTML = '';
  rightCol.innerHTML = '';
  for(let i=0;i<7;i++){
    const d = new Date(pointer);
    d.setDate(d.getDate() + i);
    const card = document.createElement('div');
    card.className = 'day-card';
    const fer = prepareFeriados(d.getFullYear());
    const fk = `${d.getMonth()}-${d.getDate()}`;
    if(d.getDay()===0 || d.getDay()===6) card.classList.add('weekend');
    if(fer[fk]) card.classList.add('holiday');

    const lines = document.createElement('div');
    lines.className = 'lines';
    card.appendChild(lines);

    const content = document.createElement('div');
    content.className = 'day-content';
    const head = document.createElement('div');
    head.className = 'day-header';
    head.innerHTML = `<div>${['Dom','Seg','Ter','Qua','Qui','Sex','Sab'][d.getDay()]} ${d.getDate()}</div>`;
    const note = document.createElement('div');
    note.className = 'note';

    const saved = localStorage.getItem(keyOf(d));
    if(saved){
      try{
        const obj = JSON.parse(saved);
        // obj.text is stored as serialized lines
        // display inside note as HTML; ensure background lines still visible
        note.innerHTML = obj.text || '';
      }catch(e){
        note.textContent = saved;
      }
    } else note.innerHTML = '';

    content.appendChild(head);
    content.appendChild(note);
    card.appendChild(content);

    card.onclick = ()=> openEditor(d);

    enableRollOnPreview(note);

    if(i < 4) leftCol.appendChild(card); else rightCol.appendChild(card);
  }
  monthLabel.textContent = `${monthNames[pointer.getMonth()]} ${pointer.getFullYear()}`;
}

/* ===== editor (per-line) ===== */
function openEditor(d){
  editKey = keyOf(d);
  const editor = document.querySelector('.editor');

  if(isHolidayOrWeekend(d)){
    editor.classList.add('editing-weekend');
    editorLines.style.background = 'linear-gradient(90deg, rgba(183,28,28,0.02) 0%, rgba(255,255,255,0) 60%), repeating-linear-gradient(to bottom, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 24px)';
  } else {
    editor.classList.remove('editing-weekend');
    editorLines.style.background = 'repeating-linear-gradient(to bottom, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 24px)';
  }

  const saved = localStorage.getItem(editKey);
  if(saved){
    try{
      const obj = JSON.parse(saved);
      loadLinesFromHTML(obj.text);
    }catch(e){
      loadLinesFromHTML('');
    }
  } else {
    loadLinesFromHTML('');
  }

  const dt = new Date(d);
  document.getElementById('editorTitle').textContent = `Editar anotação — ${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}`;
  editorOverlay.classList.add('active');
  setTimeout(()=> focusLastLine(), 60);
}

document.getElementById('closeBtn').onclick = ()=> { editorOverlay.classList.remove('active'); };
document.getElementById('saveBtn').onclick = ()=> {
  const html = serializeLinesToHTML();
  if(!editKey) editKey = keyOf(pointer);
  localStorage.setItem(editKey, JSON.stringify({text: html}));
  editorOverlay.classList.remove('active');
  renderWeek();
};
document.getElementById('deleteBtn').onclick = ()=> {
  if(!editKey) return;
  localStorage.removeItem(editKey);
  editorOverlay.classList.remove('active');
  renderWeek();
};

/* line helpers */
function createLine(contentHTML=''){
  const div = document.createElement('div');
  div.className = 'line';
  div.contentEditable = 'true';
  div.innerHTML = contentHTML || '<span class="line-placeholder">&nbsp;</span>';
  div.addEventListener('keydown', onLineKeyDown);
  div.addEventListener('focus', onLineFocus);
  return div;
}

function loadLinesFromHTML(html){
  editorLines.innerHTML = '';
  if(!html){
    for(let i=0;i<12;i++) editorLines.appendChild(createLine(''));
    return;
  }
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const nodes = Array.from(temp.childNodes);
  if(nodes.length === 0){
    // if html contained separators only
    editorLines.appendChild(createLine(html));
  } else {
    nodes.forEach(n=>{
      if(n.nodeType === 3){
        editorLines.appendChild(createLine(n.textContent));
      } else if(n.nodeType === 1 && n.tagName.toLowerCase() === 'div'){
        editorLines.appendChild(createLine(n.innerHTML));
      } else {
        editorLines.appendChild(createLine(n.outerHTML));
      }
    });
  }
  while(editorLines.children.length < 6) editorLines.appendChild(createLine(''));
}

function serializeLinesToHTML(){
  const arr = [];
  Array.from(editorLines.children).forEach(ch=>{
    arr.push(ch.innerHTML);
  });
  // join with a small divider so we can reconstruct lines if needed
  return arr.join('<div></div>');
}

function focusLastLine(){
  const last = editorLines.querySelector('.line:last-child');
  if(last) last.focus();
}

function onLineKeyDown(e){
  if(e.key === 'Enter'){
    e.preventDefault();
    const current = this;
    const newLine = createLine('');
    if(current.nextSibling) editorLines.insertBefore(newLine, current.nextSibling);
    else editorLines.appendChild(newLine);
    setTimeout(()=> newLine.focus(),20);
  }
  if(e.key === 'Tab'){
    e.preventDefault();
    document.execCommand('insertText', false, '    ');
  }
}

function onLineFocus(e){
  if(this.querySelector('.line-placeholder')){
    this.innerHTML = '';
  }
}

/* selection color functions */
function applyColorToSelection(color){
  const sel = window.getSelection();
  if(!sel || sel.rangeCount === 0) return;
  const range = sel.getRangeAt(0);
  if(!isOrContains(editorLines, range.commonAncestorContainer)) return;
  if(range.collapsed) return;
  const span = document.createElement('span');
  span.style.background = color;
  span.style.padding = '0 6px';
  span.style.borderRadius = '4px';
  try{
    range.surroundContents(span);
  }catch(e){
    const frag = range.extractContents();
    span.appendChild(frag);
    range.insertNode(span);
  }
  sel.removeAllRanges();
  const nr = document.createRange();
  nr.setStartAfter(span);
  nr.collapse(true);
  sel.addRange(nr);
  editorLines.focus();
}

function removeColorFromSelection(){
  const sel = window.getSelection();
  if(!sel || sel.rangeCount === 0) return;
  const range = sel.getRangeAt(0);
  if(!isOrContains(editorLines, range.commonAncestorContainer)) return;
  if(range.collapsed) return;
  const extracted = range.extractContents();
  const wrapper = document.createElement('span');
  wrapper.appendChild(extracted);
  const spans = wrapper.querySelectorAll ? wrapper.querySelectorAll('span') : [];
  spans.forEach(s=>{
    s.style.background = '';
    const st = s.getAttribute('style') || '';
    if(!st.trim()){
      const p = s.parentNode;
      while(s.firstChild) p.insertBefore(s.firstChild, s);
      p.removeChild(s);
    }
  });
  range.insertNode(wrapper);
}

function isOrContains(container, node){
  while(node){
    if(node === container) return true;
    node = node.parentNode;
  }
  return false;
}

/* roll preview */
function enableRollOnPreview(el){
  if(!el) return;
  let startY=0, scrollStart=0, down=false;
  el.style.touchAction = 'none';
  el.addEventListener('pointerdown', ev=>{
    down=true; startY = ev.clientY; scrollStart = el.scrollTop;
    try{ ev.target.setPointerCapture(ev.pointerId); }catch(e){}
  });
  el.addEventListener('pointermove', ev=>{
    if(!down) return;
    const dy = ev.clientY - startY;
    el.scrollTop = scrollStart - dy;
  });
  el.addEventListener('pointerup', ev=>{
    down=false; try{ ev.target.releasePointerCapture(ev.pointerId); }catch(e){}
  });
  el.addEventListener('pointercancel', ()=> down=false);
}

/* swipe navigation touch/mouse */
let touchStartX=0, touchStartY=0;
const swipeThreshold = 60;
function onTouchStart(e){ const t = e.touches ? e.touches[0] : e; touchStartX = t.clientX; touchStartY = t.clientY; }
function onTouchEnd(e){ const t = e.changedTouches ? e.changedTouches[0] : e; const dx = t.clientX - touchStartX; const dy = t.clientY - touchStartY;
  if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > swipeThreshold){
    if(monthModal.classList.contains('active')){
      if(dx < 0) { pointer.setMonth(pointer.getMonth()+1); renderWeek(); monthLabel.textContent = `${monthNames[pointer.getMonth()]} ${pointer.getFullYear()}`; monthLabel.click(); }
      else { pointer.setMonth(pointer.getMonth()-1); renderWeek(); monthLabel.textContent = `${monthNames[pointer.getMonth()]} ${pointer.getFullYear()}`; monthLabel.click(); }
    } else {
      if(dx < 0) { pointer.setDate(pointer.getDate()+7); pointer = startOfWeek(pointer); renderWeek(); }
      else { pointer.setDate(pointer.getDate()-7); pointer = startOfWeek(pointer); renderWeek(); }
    }
  }
}
document.addEventListener('touchstart', onTouchStart, {passive:true});
document.addEventListener('touchend', onTouchEnd, {passive:true});

let md=false, mx=0;
document.addEventListener('mousedown', e=>{ md=true; mx=e.clientX; });
document.addEventListener('mouseup', e=>{
  if(!md) return; md=false;
  const dx = e.clientX - mx;
  if(Math.abs(dx) > swipeThreshold){
    if(monthModal.classList.contains('active')){
      if(dx < 0){ pointer.setMonth(pointer.getMonth()+1); renderWeek(); monthLabel.click(); }
      else { pointer.setMonth(pointer.getMonth()-1); renderWeek(); monthLabel.click(); }
    } else {
      if(dx < 0){ pointer.setDate(pointer.getDate()+7); pointer = startOfWeek(pointer); renderWeek(); }
      else { pointer.setDate(pointer.getDate()-7); pointer = startOfWeek(pointer); renderWeek(); }
    }
  }
});

/* ===== preview & PDF generation with fallback ===== */
function exportPDF(element, title, page='a4', orientation='l', marginCm=1.5){
  const clone = element.cloneNode(true);
  // remove contenteditable attributes inside clone for cleaner render
  clone.querySelectorAll('[contenteditable]').forEach(n=>n.removeAttribute('contenteditable'));
  const wrapper = document.createElement('div');
  wrapper.style.boxSizing = 'border-box';
  wrapper.style.padding = marginCm + 'cm';
  wrapper.style.background = '#fff';
  wrapper.appendChild(clone);

  return html2canvas(wrapper, { scale: 3, backgroundColor: '#ffffff', useCORS: true, logging: false }).then(canvas=>{
    const imgData = canvas.toDataURL('image/png');
    // try to create PDF
    try{
      const jspdf = window.jspdf;
      const jsPDF = jspdf && jspdf.jsPDF ? jspdf.jsPDF : (window.jspdf && window.jspdf.jsPDF ? window.jspdf.jsPDF : null);
      if(!jsPDF && window.jspdf && window.jspdf.jsPDF) {
        // older shapes; try window.jspdf
      }
      if(!jsPDF && window.jspdf && typeof window.jspdf === 'function') {
        // some builds expose differently
      }
      if(!jsPDF && window.jsPDF) {
        // fallback
      }
      const { jsPDF: J } = window.jspdf || {};
      const PDFLib = J || window.jsPDF || null;
      if(!PDFLib) throw new Error('jsPDF não encontrado');
      const pdf = new PDFLib({ orientation: orientation, unit: 'pt', format: page });
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const marginPt = marginCm * 28.3464567;
      const availW = pageWidth - marginPt * 2;
      const availH = pageHeight - marginPt * 2;
      const img = new Image();
      img.onload = function(){
        let renderW = availW;
        let renderH = (img.height * renderW) / img.width;
        if(renderH > availH){
          renderH = availH;
          renderW = (img.width * renderH) / img.height;
        }
        const x = (pageWidth - renderW) / 2;
        const y = (pageHeight - renderH) / 2;
        pdf.addImage(imgData, 'PNG', x, y, renderW, renderH);
        pdf.save(`${title}.pdf`);
      };
      img.src = imgData;
      return Promise.resolve(true);
    }catch(err){
      // fallback: open image in new tab or trigger download if blocked
      const w = window.open('');
      if(!w){
        // try download
        const a = document.createElement('a');
        a.href = imgData;
        a.download = `${title}.png`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        return Promise.resolve(false);
      }
      w.document.write(`<!doctype html><html><head><title>${title}</title></head><body style="margin:0"><img src="${imgData}" style="width:100%;height:auto"/></body></html>`);
      w.document.close();
      return Promise.resolve(false);
    }
  });
}

/* print month window (A4) with fallback */
function printMonthWindow(table){
  const w = window.open('', '_blank');
  if(!w){
    alert('Pop-up bloqueado. Habilite pop-ups ou use gerar PDF.');
    return;
  }
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#b71c1c';
  const styles = `
    <style>
      body{margin:0;font-family:Arial,Helvetica,sans-serif}
      .page{width:29.7cm;padding:1.5cm;box-sizing:border-box}
      table{width:100%;border-collapse:collapse}
      th,td{border:1px solid rgba(0,0,0,0.08);vertical-align:top;padding:8px;height:90px}
      th{background:#111;color:#fff}
      .weekend-cell,.holiday-cell{background:${accent};color:#fff}
      .cell-note{font-size:9pt;max-height:52px;overflow:hidden}
    </style>
  `;
  try{
    w.document.write(`<!doctype html><html><head><title>Imprimir Mês</title>${styles}</head><body><div class="page">${table.outerHTML}</div></body></html>`);
    w.document.close();
    setTimeout(()=> {
      try { w.print(); } catch(e) { alert('Erro ao imprimir: ' + e.message); }
    }, 600);
  }catch(e){
    // fallback: exportPDF
    exportPDF(table, 'Calendario', 'a4', 'l', 1.5).catch(err=>{
      alert('Erro ao preparar impressão/PDF: ' + (err.message||err));
    });
  }
}

/* month start always Monday */
function getMonthStart(year,month){
  const first = new Date(year,month,1);
  const day = first.getDay();
  const start = new Date(first);
  if(day === 1) return start;
  const offset = (day === 0) ? -6 : 1 - day;
  start.setDate(start.getDate() + offset);
  return start;
}
